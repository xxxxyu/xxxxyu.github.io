<!doctype html>
<meta charset="utf-8">
<title>Redirect</title>
<link rel="canonical" href="/">
<script>
  const target = "/";
  const hash = window.location.hash || "";
  window.location.replace(target + hash);
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=/">
</noscript>
<p><a href="/">Click here</a> to be redirected.</p>
