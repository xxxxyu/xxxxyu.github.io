<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Xiangyu Li</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            color: #333;
        }
        .container {
            padding: 20px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        #countdown {
            font-weight: bold;
            color: #0066cc;
        }
    </style>
    <script>
        window.onload = function() {
            let timeLeft = 3;
            const countdownElement = document.getElementById('countdown');
            
            const countdownInterval = setInterval(function() {
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    window.location.href = "https://xxxxyu.github.io/academic";
                } else {
                    countdownElement.textContent = timeLeft;
                    timeLeft--;
                }
            }, 1000);
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Xiangyu Li</h1>
        <p>
            Redirecting to the academic homepage in <span id="countdown">3</span> seconds...
            <br><br>
            If you are not redirected automatically, <a href="https://xxxxyu.github.io/academic">click here</a>.
        </p>
    </div>
</body>
</html>
