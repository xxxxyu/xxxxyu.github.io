{% if src %}
{% set img_path = src %}
{% if not src is starting_with("/") and not src is starting_with("http") %}
  {% set img_path = get_url(path=page.colocated_path ~ src) %}
{% endif %}
<figure class="media-figure{% if full_width | default(value=false) %} full-width{% endif %}"{% if max_width %} style="max-width: {{ max_width }};"{% endif %}>
  <img src="{{ img_path }}" alt="{{ alt | default(value='') }}" class="media-figure__image{% if dimmable | default(value=false) %} dimmable-image{% endif %}{% if invertible | default(value=false) %} invertible-image{% endif %}" loading="{{ loading | default(value='lazy') }}"{% if width %} width="{{ width }}"{% endif %}{% if height %} height="{{ height }}"{% endif %}>
  {% if caption %}
  <figcaption class="media-figure__caption">{{ caption }}</figcaption>
  {% endif %}
</figure>
{% endif %}
