{% extends "base.html" %}

{% block title %}{{ page.title }} — {{ config.title }}{% endblock title %}

{% block content %}
<article>
  <h1>{{ page.title }}</h1>
  {% if page.date %}
  <time datetime="{{ page.date }}">{{ page.date | date(format="%Y/%m/%d") }}</time>
  {% endif %}
  {{ page.content | safe }}
</article>
{% endblock content %}
