name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "7 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly (fallback when SERPAPI_KEY absent)
        if: github.event_name != 'push'
        run: pip install scholarly

      - name: Refresh Google Scholar stats (best-effort)
        if: github.event_name != 'push'
        continue-on-error: true
        timeout-minutes: 2
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: timeout 60 python -u scripts/update_scholar_stats.py || echo "Scholar fetch failed or timed out; using committed fallback values."

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C /usr/local/bin

      - name: Build
        run: zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
